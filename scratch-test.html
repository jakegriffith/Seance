<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Scratch-Off Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Courier New', monospace;
      background: #ffffff;
      color: #0a0a0a;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    
    #container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
    }
    
    #hidden-message {
      position: absolute;
      z-index: 1;
      text-align: center;
      padding: 40px;
      max-width: 90%;
    }
    
    #hidden-message h2 {
      font-size: 36px;
      color: #0a0a0a;
      line-height: 1.6;
      margin-bottom: 20px;
      opacity: 1;
    }
    
    #scratch-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      cursor: grab;
      transition: opacity 1s ease-out;
    }
    
    #scratch-canvas.fading {
      opacity: 0;
      pointer-events: none;
    }
    
    #instruction {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      font-size: 16px;
      color: #888;
      text-align: center;
      pointer-events: none;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    @media (max-width: 768px) {
      
      #hidden-message h2 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <!-- Hidden message (revealed when scratched) -->
    <div id="hidden-message">
      <h2>did you really think<br>I'd tell you?</h2>
    </div>
    
    <!-- Scratch canvas -->
    <canvas id="scratch-canvas"></canvas>
    
    <!-- UI elements -->
    <div id="instruction">Swipe to uncover your answer...</div>
  </div>

  <script>
    class ScratchOffCanvas {
      constructor(canvasId, options = {}) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        
        // Options
        this.brushSize = options.brushSize || 50;
        this.revealThreshold = options.revealThreshold || 60;
        this.dirtOpacity = options.dirtOpacity || 0.95;
        
        // State
        this.isScratching = false;
        this.scratchedPixels = 0;
        this.totalPixels = 0;
        this.revealPercentage = 0;
        
        this.init();
      }
      
      init() {
        // Set canvas size
        this.resizeCanvas();
        window.addEventListener('resize', () => this.resizeCanvas());
        
        // Draw initial dirt layer
        this.drawDirtLayer();
        
        // Setup event listeners
        this.setupEventListeners();
        
        // Calculate total pixels for percentage
        this.totalPixels = this.canvas.width * this.canvas.height;
      }
      
      resizeCanvas() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
      }
      
      drawDirtLayer() {
        const ctx = this.ctx;
        const width = this.canvas.width;
        const height = this.canvas.height;
        
        // Create dirt texture with noise
        const imageData = ctx.createImageData(width, height);
        const data = imageData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          // Dark brown/black with random noise
          const noise = Math.random() * 40;
          const baseColor = 20 + noise;
          
          data[i] = baseColor;     // Red
          data[i + 1] = baseColor * 0.7; // Green (brownish tint)
          data[i + 2] = baseColor * 0.5; // Blue
          data[i + 3] = 255 * this.dirtOpacity; // Alpha
        }
        
        ctx.putImageData(imageData, 0, 0);
        
        // Add some texture overlay
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        for (let i = 0; i < 200; i++) {
          const x = Math.random() * width;
          const y = Math.random() * height;
          const size = Math.random() * 3;
          ctx.fillRect(x, y, size, size);
        }
      }
      
      setupEventListeners() {
        // Mouse events
        this.canvas.addEventListener('mousedown', (e) => this.startScratching(e));
        this.canvas.addEventListener('mousemove', (e) => this.scratch(e));
        this.canvas.addEventListener('mouseup', () => this.stopScratching());
        this.canvas.addEventListener('mouseleave', () => this.stopScratching());
        
        // Touch events
        this.canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          this.startScratching(e.touches[0]);
        });
        this.canvas.addEventListener('touchmove', (e) => {
          e.preventDefault();
          this.scratch(e.touches[0]);
        });
        this.canvas.addEventListener('touchend', () => this.stopScratching());
      }
      
      startScratching(e) {
        this.isScratching = true;
        this.scratch(e);
      }
      
      stopScratching() {
        this.isScratching = false;
      }
      
      scratch(e) {
        if (!this.isScratching) return;
        
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        // Erase circular area
        this.ctx.globalCompositeOperation = 'destination-out';
        this.ctx.beginPath();
        this.ctx.arc(x, y, this.brushSize / 2, 0, Math.PI * 2);
        this.ctx.fill();
        this.ctx.globalCompositeOperation = 'source-over';
        
        // Calculate reveal percentage
        this.calculateRevealPercentage();
      }
      
      calculateRevealPercentage() {
        // Check if threshold reached for auto-fade
        const imageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
        const data = imageData.data;
        let transparent = 0;
        
        // Sample every 10th pixel for performance
        for (let i = 3; i < data.length; i += 40) {
          if (data[i] < 128) { // Alpha channel
            transparent++;
          }
        }
        
        const sampledTotal = data.length / 40;
        this.revealPercentage = Math.round((transparent / sampledTotal) * 100);
        
        // Auto-fade canvas when threshold reached
        if (this.revealPercentage >= this.revealThreshold && !this.hasRevealed) {
          this.hasRevealed = true;
          this.canvas.classList.add('fading');
          document.getElementById('instruction').style.display = 'none';
        }
      }
    }
    
    // Initialize scratch-off (simple, no controls)
    const scratchOff = new ScratchOffCanvas('scratch-canvas');
  </script>
</body>
</html>
