<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Dead Internet Ritual</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0a0a0a;
      color: #00ff88;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    
    /* Glitch background effect */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.1) 0px,
        rgba(0, 0, 0, 0.1) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      animation: scanline 8s linear infinite;
    }
    
    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(100%); }
    }
    
    .container {
      text-align: center;
      max-width: 600px;
      position: relative;
      z-index: 1;
      animation: fadeIn 1s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 32px;
      line-height: 1.4;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
      animation: glitchText 3s infinite;
    }
    
    @keyframes glitchText {
      0%, 90%, 100% {
        transform: translate(0);
      }
      92% {
        transform: translate(-2px, 2px);
      }
      94% {
        transform: translate(2px, -2px);
      }
      96% {
        transform: translate(-2px, -2px);
      }
      98% {
        transform: translate(2px, 2px);
      }
    }
    
    p {
      font-size: 18px;
      line-height: 1.8;
      color: #88ffaa;
      margin-bottom: 24px;
      text-shadow: 0 0 5px rgba(0, 255, 136, 0.2);
    }
    
    .emphasis {
      color: #00ff88;
      font-weight: 600;
      font-size: 24px;
      display: block;
      margin: 32px 0;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
      }
      50% {
        opacity: 0.7;
        text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
      }
    }
    
    .footer {
      margin-top: 48px;
      font-size: 14px;
      color: #446655;
      font-style: italic;
    }
    
    /* Static/noise effect */
    @keyframes static {
      0%, 100% { opacity: 0.05; }
      50% { opacity: 0.1; }
    }
    
    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.05" /></svg>');
      pointer-events: none;
      animation: static 0.5s infinite;
      mix-blend-mode: overlay;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>What're you willing to give up?</h1>
    
    <p>You thought this would be free?</p>
    
    <p>In the dead internet, nothing comes without a price.</p>
    
    <span class="emphasis">Don't you know nothing comes for free?</span>
    
    <p>Every answer extracted.<br>
       Every truth commodified.<br>
       Every ghost demands payment.</p>
    
    <div class="footer">
      — The Dead Internet Remembers —
    </div>
  </div>
</body>
</html>
